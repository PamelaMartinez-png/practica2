<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
</head>
<body class="hold-transition login-page">
<div class="register-box" style="width: 550px;">
    <div class="card card-outline card-success">
        <div class="card-header text-center">
            <h2 th:text="${paciente.id == null} ? 'Registrar Paciente' : 'Actualizar Paciente'"></h2>
        </div>
        <div class="card-body">
            <form th:action="@{/pacientes/guardar}" th:object="${paciente}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>DNI:</label>
                    <input type="text" th:field="*{dni}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Fecha de Nacimiento:</label>
                    <input type="date" th:field="*{fecha}" class="form-control" required>
                </div>

                <div class="row mt-4">
                    <div class="col-6">
                        <a th:href="@{/pacientes}" class="btn btn-secondary btn-block">Cancelar</a>
                    </div>
                    <div class="col-6">
                        <button type="submit" class="btn btn-success btn-block">Guardar Datos</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
